            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 8px #00ffcc, 0 0 15px #00ffcc, 0 0 25px #00ffcc;
            display: block;
            width: 100%;
        }

        /* Pure CSS Glowing Buttons (Replaces Images) */
        .scorp-btn {
            display: inline-block;
            text-decoration: none;
            background: rgba(20, 20, 25, 0.8);
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 10px 20px;
            margin: 8px;
            border: 2px solid #ff3300;
            border-radius: 6px;
            box-shadow: 0 0 8px rgba(255, 51, 0, 0.3), inset 0 0 8px rgba(255, 51, 0, 0.2);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
            cursor: pointer;
            min-width: 150px;
            vertical-align: middle;
        }

        /* Hover Glow and Shake Animation */
        .scorp-btn:hover {
            background: #ff3300;
            color: #fff;
            box-shadow: 0 0 15px #ff3300, 0 0 30px #ff6600;
            text-shadow: 0 0 8px #fff;
            transform: translateY(-2px);
            animation: shake 0.5s infinite;
        }

        /* Category Selector Buttons */
        .scorp-cat-btn {
            border-color: #ffcc00;
            box-shadow: 0 0 8px rgba(255, 204, 0, 0.3);
        }
        .scorp-cat-btn:hover {
            background: #ffcc00;
            color: #121214;
            box-shadow: 0 0 15px #ffcc00, 0 0 30px #ffcc00;
            text-shadow: none;
        }

        @keyframes shake {
            0% { transform: translateY(-2px) translateX(0); }
            20% { transform: translateY(-2px) translateX(-2px); }
            40% { transform: translateY(-2px) translateX(2px); }
            60% { transform: translateY(-2px) translateX(-2px); }
            80% { transform: translateY(-2px) translateX(2px); }
            100% { transform: translateY(-2px) translateX(0); }
        }

            color: #ffcc00;

        }
