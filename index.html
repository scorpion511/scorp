<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scorpion Hack All In 1</title>
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    
    <!-- Automatically redirects to your 1index.html page after 3 seconds -->
    <meta http-equiv="refresh" content="3;URL=1index.html">
    
    <link rel="stylesheet" type="text/css" href="styles.css"/>
    
    <style>
        html, body {
            background-image: url('img.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #121214;
            color: white;
            text-align: center;
            margin: 0px;
            padding: 0px;
            overflow: hidden;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glowing Welcome Animation Container */
        .welcome-container {
            display: flex;
            gap: 6px;
            font-size: 32px; /* Made smaller so it doesn't cover the screen */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Glowing Letter Effect */
        .welcome-container p {
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px #ff3300, 0 0 20px #ff3300, 0 0 30px #ff6600, 0 0 40px #ff6600;
            animation: scorpPulse 1.5s ease-in-out infinite alternate;
        }

        /* Adds a staggered delay for each letter to make a wave animation wave */
        .welcome-container p:nth-child(1) { animation-delay: 0.1s; }
        .welcome-container p:nth-child(2) { animation-delay: 0.2s; }
        .welcome-container p:nth-child(3) { animation-delay: 0.3s; }
        .welcome-container p:nth-child(4) { animation-delay: 0.4s; }
        .welcome-container p:nth-child(5) { animation-delay: 0.5s; }
        .welcome-container p:nth-child(6) { animation-delay: 0.6s; }
        .welcome-container p:nth-child(7) { animation-delay: 0.7s; }

        @keyframes scorpPulse {
            0% {
                transform: scale(1);
                text-shadow: 0 0 10px #ff3300, 0 0 20px #ff3300, 0 0 30px #ff6600;
            }
            100% {
                transform: scale(1.1); /* Slightly reduced scale effect to look cleaner */
                text-shadow: 0 0 20px #ff3300, 0 0 40px #ff6600, 0 0 60px #ff9900;
                color: #ffcc00;
            }
        }
    </style>
</head>
<body translate="no">

    <!-- Glowing, Animated Welcome Text Split Into Individual Letters -->
    <div class="welcome-container">
        <p>W</p>
        <p>e</p>
        <p>l</p>
        <p>c</p>
        <p>o</p>
        <p>m</p>
        <p>e</p>
    </div>

</body>
</html>
