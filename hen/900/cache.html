<html manifest="Cache.manifest">
<head>
    <title>Scorpio Project - Ahmed Essam</title>
    <style>
        html, body {
background-image: url('img.jpg');
background-size: cover !important;
background-position: center center !important;
background-repeat: no-repeat !important;
background-attachment: fixed !important;
background-color: #05161e !important;
        }
        /* Scorpio Status Container */
        .status-box {
            margin-top: 150px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            display: inline-block;
            padding: 50px 70px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
        }

        #progress {
            font-size: 32px;
            font-weight: bold;
            color: #e0faff;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
            letter-spacing: 1px;
        }

        /* Stable Designer Credit Rectangle */
        .designer-credit {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 10px 40px;
            border-radius: 4px;
            font-size: 22px; /* Set to your stable size */
            letter-spacing: 2px;
            color: #00e5ff;
            white-space: nowrap;
        }
        .designer-credit span { color: white; font-weight: bold; }
    </style>
</head>
<body>
    <script>
        // CLEAN HISTORY TO PREVENT BUGS
        history.replaceState(null,null,'index.html');
        var histlength=history.length;
        history.go(-histlength);

        function DLProgress(e){
            Percent=(Math.round(e.loaded / e.total * 100));
            setTimeout(function(){
                window.progress.innerHTML="Installing Scorpio Cache: " + Percent + "%";
            },500);
        }

        function DisplayCacheProgress(){
            setTimeout(function(){
                window.progress.innerHTML="Scorpio Cache Installed Successfully ✔";
            },1500);
            setTimeout(function(){
                window.progress.innerHTML="Now Close And Re-Open Your Browser ..";
            },3500);
        }

        window.applicationCache.addEventListener("progress",DLProgress,false);
        window.applicationCache.oncached=function(e){DisplayCacheProgress();};
        window.applicationCache.onupdateready=function(e){DisplayCacheProgress();};
    </script>

    <div class="status-box">
        <h1 id="progress">Preparing Scorpio Caching...</h1>
    </div>

    <div class="designer-credit">
        Designed and Compiled By <span>Ahmed Essam</span>
    </div>
</body>
</html>
