<html>
<head>
    <title>The Scorpio Host - Ahmed Essam</title>
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* Scorpio Status Container */
        .status-box {
            margin-top: 150px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 229, 255, 0.3);
            display: inline-block;
            padding: 50px 70px;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
        }

        #msgs {
            font-size: 32px;
            font-weight: bold;
            color: #e0faff;
            text-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
            letter-spacing: 2px;
        }

        /* Animated Loader */
        .loader {
            margin: 30px auto;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00e5ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Stable Designer Credit Rectangle */
        .designer-credit {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 10px 40px;
            border-radius: 4px;
            font-size: 22px; /* Restored to stable size */
            letter-spacing: 2px;
            color: #00e5ff;
            white-space: nowrap;
        }
        .designer-credit span { color: white; font-weight: bold; }

        #console { display: none; }
    </style>

    <script>
        if (window.applicationCache.status=='0'){window.location.replace("cache.html");}
    </script>
    <script src="payload.js"></script>
    <script type='module' src='./alert.mjs'></script>
</head>
<body>
    <pre id='console'></pre>

    <div class="status-box">
        <img src="../../logo.png" style="width: 220px; margin-bottom: 25px; filter: drop-shadow(0 0 10px #00e5ff);">
        <h1 id="msgs">Jailbreaking <span style="color:#fc0404;">( Please wait ) ....</span></h1>
        <div class="loader"></div>
    </div>

    <div class="designer-credit">
        Designed and Compiled By <span>Ahmed Essam</span>
    </div>
</body>
</html>
