<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Scorpion Hack - Offline Cache Restore Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <style>
        html, body {
            background-image: url('img.jpg'); /* Safe local step-out mapping */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #121214;
            color: white;
            text-align: center;
            margin: 0px;
            padding: 0px;
            overflow-x: hidden;
            overflow-y: auto;
            min-height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* High-End Glowing Header Style */
        .scorp-header {
            font-size: 32px;
            margin-top: 40px;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #ff3300, 0 0 20px #ff3300, 0 0 30px #ff6600, 0 0 40px #ff6600;
        }

        /* Pure CSS Glowing Buttons (Replaces Images) */
        .scorp-btn {
            display: inline-block;
            text-decoration: none;
            background: rgba(20, 20, 25, 0.75);
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 14px 30px;
            margin: 12px;
            border: 2px solid #ff3300;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(255, 51, 0, 0.3), inset 0 0 10px rgba(255, 51, 0, 0.2);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            min-width: 220px;
            text-transform: uppercase;
        }

        /* Hover Glow and Shake Animation */
        .scorp-btn:hover {
            background: #ff3300;
            color: #fff;
            box-shadow: 0 0 20px #ff3300, 0 0 40px #ff6600;
            text-shadow: 0 0 8px #fff;
            transform: translateY(-3px);
            animation: shake 0.5s infinite;
        }

        /* Special Cyan Glow Back Button Layout */
        .scorp-back-btn {
            border-color: #00ffcc;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        .scorp-back-btn:hover {
            background: #00ffcc;
            color: #121214;
            box-shadow: 0 0 20px #00ffcc, 0 0 40px #00ffcc;
            text-shadow: none;
        }

        @keyframes shake {
            0% { transform: translateY(-3px) translateX(0); }
            20% { transform: translateY(-3px) translateX(-2px); }
            40% { transform: translateY(-3px) translateX(2px); }
            60% { transform: translateY(-3px) translateX(-2px); }
            80% { transform: translateY(-3px) translateX(2px); }
            100% { transform: translateY(-3px) translateX(0); }
        }

        #msgs {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc00;
            margin-top: 20px;
            min-height: 35px;
            text-shadow: 1px 1px 3px black;
        }

        .menu-container {
            margin-top: 40px;
            padding: 10px;
        }

        /* High-End Glowing Credits Style */
        .scorp-credits {
            font-size: 18px;
            margin-top: 60px;
            margin-bottom: 30px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 8px #00ffcc, 0 0 15px #00ffcc, 0 0 25px #00ffcc;
            display: inline-block;
            width: 100%;
        }
    </style>
</head>
<body>

    <!-- Main Visual Title Framework -->
    <div class="scorp-header">
        WELCOME TO SCORPION HACK ALL IN 1
    </div>
    
    <!-- Active Status Communication Hub -->
    <h1 id="msgs">Select a Cache Version to Restore User's Guide</h1>

    <!-- Layout Menu Shell (Fixed Local Relative Redirect Navigation Links) -->
    <div class="menu-container">
        <a href="505/index.html" class="scorp-btn" onMouseOver="document.getElementById('msgs').innerHTML='Save a page to a Users Guide Without using usb version 5.05'">
            5.05 Restore Cache
        </a>
        <a href="672/index.html" class="scorp-btn" onMouseOver="document.getElementById('msgs').innerHTML='Save a page to a Users Guide Without using usb version 6.72'">
            6.72 Restore Cache
        </a>
        <a href="702/index.html" class="scorp-btn" onMouseOver="document.getElementById('msgs').innerHTML='Save a page to a Users Guide Without using usb version 7.02'">
            7.02 Restore Cache
        </a>
        <a href="755/index.html" class="scorp-btn" onMouseOver="document.getElementById('msgs').innerHTML='Save a page to a Users Guide Without using usb version 7.55'">
            7.55 Restore Cache
        </a>
        <a href="900/index.html" class="scorp-btn" onMouseOver="document.getElementById('msgs').innerHTML='Save a page to a Users Guide Without using usb version 9.00'">
            9.00 Restore Cache
        </a>
        <br><br>
        <a href="../index.html" class="scorp-btn scorp-back-btn" onMouseOver="document.getElementById('msgs').innerHTML='Return back to main GoldHEN Selection Board'">
            ← BACK TO HEN SELECTION
        </a>
    </div>

    <!-- Integrated Branding Signoff Footer Section -->
    <div class="scorp-credits">
        Designed and Compiled By Ahmed ESSAM
    </div>

</body>
</html>
