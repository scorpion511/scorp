<html manifest="Cache.manifest">
<head>
<title>THE SCORPION HOST 6.72</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background-image: url('../../img.jpg'); 
  background-size: 100% 100%; 
  background-position: center center;
  background-repeat: no-repeat;
}
</style>
</head>
<body>

<!-- The HTML elements must be placed ABOVE the script so the script can find them -->
<br>
<h1 id="msgs" style="font-size: 30px; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-family: sans-serif; text-align: center; margin: 0; width: 100%;">
  Compiled and Hacked By Ahmed Essam
</h1>
<script>
// Safely clear the URL tracking state without crashing the page history
if(window.history.replaceState) {
  window.history.replaceState(null, null, 'index.html');
}

function DLProgress(e){
  if (e.total) {
    var Percent = Math.round(e.loaded / e.total * 100);
    document.getElementById("msgs").innerHTML = "Installing Offline Cache: " + Percent + "%";
  }
}

function DisplayCacheProgress(){
  setTimeout(function(){
    document.getElementById("msgs").innerHTML = "Cache Installed Successfully ✔";
  }, 1000);
  
  setTimeout(function(){
    document.getElementById("msgs").innerHTML = "Now close.......disconnect the Internet from the device and reopen your browser...";
  }, 3000);
}

// Attach the caching events properly to the applicationCache system
if (window.applicationCache) {
  window.applicationCache.addEventListener("progress", DLProgress, false);
  window.applicationCache.oncached = function(e){ DisplayCacheProgress(); };
  window.applicationCache.onupdateready = function(e){ DisplayCacheProgress(); };
}
</script>

</body>
</html>
