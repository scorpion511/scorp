<html>
<head>
    <title>Scorpio Project - Firmware Bridge</title>
    <style>
        html, body {
            background: url('../img.jpg') no-repeat center center fixed; 
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .scorpio-logo {
            width: 280px;
            margin-top: 40px;
            filter: drop-shadow(0 0 15px rgba(0, 229, 255, 0.8));
        }

        .menu-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 0 50px;
        }

        .scorpio-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: #e0faff;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.2);
            transition: 0.3s;
            display: inline-block;
        }

        .scorpio-btn:hover {
            background: rgba(0, 229, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 229, 255, 0.8);
            border: 1px solid rgba(0, 229, 255, 1);
            transform: scale(1.05);
        }

        #msgs {
            font-size: 26px;
            color: #00e5ff;
            margin-top: 20px;
            height: 40px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        /* Stable Designer Credit Rectangle */
        .designer-credit {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 229, 255, 0.4);
            padding: 10px 40px;
            border-radius: 4px;
            font-size: 22px; /* Restored to stable size */
            letter-spacing: 2px;
            color: #00e5ff;
            white-space: nowrap;
        }
        .designer-credit span { color: white; font-weight: bold; }
    </style>
</head>
<body>

    <img src="../logo.png" class="scorpio-logo">
    <div id="msgs">Select PS4 Firmware</div>

    <div class="menu-container">
        <a href="505/index.html" class="scorpio-btn" onmouseover="msgs.innerHTML='PS4 Version 5.05'">FW 5.05</a>
        <a href="672/index.html" class="scorpio-btn" onmouseover="msgs.innerHTML='PS4 Version 6.72'">FW 6.72</a>
        <a href="702/index.html" class="scorpio-btn" onmouseover="msgs.innerHTML='PS4 Version 7.02'">FW 7.02</a>
        <a href="755/index.html" class="scorpio-btn" onmouseover="msgs.innerHTML='PS4 Version 7.55'">FW 7.55</a>
        <a href="900/index.html" class="scorpio-btn" onmouseover="msgs.innerHTML='PS4 Version 9.00 (PSFree No USB)'">FW 9.00</a>
        <a href="restore/index.html" class="scorpio-btn" style="border-color: #ffcc00; color: #ffcc00;" onmouseover="msgs.innerHTML='Restore User Guide'">Restore</a>
    </div>

    <div class="designer-credit">
        Designed and Compiled By <span>Ahmed Essam</span>
    </div>

</body>
</html>
