<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scorpion Project - GoldHEN Selection</title>
    <style>
        html, body {
            background: url('img.jpg') no-repeat center center fixed; 
            background-size: cover;
            background-color: #121214;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* High-End Glowing Header Style */
        .scorp-header {
            font-size: 32px;
            margin-top: 40px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #ff3300, 0 0 20px #ff3300, 0 0 30px #ff6600, 0 0 40px #ff6600;
        }

        .menu-container {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            padding: 0 50px;
        }

        /* Pure CSS Glowing Buttons (Matches 1index/2index) */
        .scorp-btn {
            display: inline-block;
            text-decoration: none;
            background: rgba(20, 20, 25, 0.75);
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 12px 28px;
            margin: 10px;
            border: 2px solid #ff3300;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(255, 51, 0, 0.3), inset 0 0 10px rgba(255, 51, 0, 0.2);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            min-width: 140px;
            text-transform: uppercase;
        }

        /* Hover Glow and Shake Animation */
        .scorp-btn:hover {
            background: #ff3300;
            color: #fff;
            box-shadow: 0 0 20px #ff3300, 0 0 40px #ff6600;
            text-shadow: 0 0 8px #fff;
            transform: translateY(-3px);
            animation: shake 0.5s infinite;
        }

        /* Yellow Glow for Restore Button Option */
        .scorp-restore-btn {
            border-color: #ffcc00;
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.3);
        }
        .scorp-restore-btn:hover {
            background: #ffcc00;
            color: #121214;
            box-shadow: 0 0 20px #ffcc00, 0 0 40px #ffcc00;
            text-shadow: none;
        }

        @keyframes shake {
            0% { transform: translateY(-3px) translateX(0); }
            20% { transform: translateY(-3px) translateX(-2px); }
            40% { transform: translateY(-3px) translateX(2px); }
            60% { transform: translateY(-3px) translateX(-2px); }
            80% { transform: translateY(-3px) translateX(2px); }
            100% { transform: translateY(-3px) translateX(0); }
        }

        #msgs {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc00;
            margin-top: 20px;
            min-height: 35px;
            text-shadow: 1px 1px 3px black;
        }

        /* High-End Glowing Credits Style */
        .scorp-credits {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 8px #00ffcc, 0 0 15px #00ffcc, 0 0 25px #00ffcc;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <!-- Main Dynamic Header -->
    <div class="scorp-header">
        WELCOME TO SCORPION HACK ALL IN 1
    </div>
    
    <!-- Status Display Message -->
    <div id="msgs">Select PS4 Firmware</div>

    <!-- Clean Navigation Options -->
    <div class="menu-container">
        <a href="505/index.html" class="scorp-btn" onmouseover="document.getElementById('msgs').innerHTML='PS4 Version 5.05 GoldHEN'">FW 5.05</a>
        <a href="672/index.html" class="scorp-btn" onmouseover="document.getElementById('msgs').innerHTML='PS4 Version 6.72 GoldHEN'">FW 6.72</a>
        <a href="702/index.html" class="scorp-btn" onmouseover="document.getElementById('msgs').innerHTML='PS4 Version 7.02 GoldHEN'">FW 7.02</a>
        <a href="755/index.html" class="scorp-btn" onmouseover="document.getElementById('msgs').innerHTML='PS4 Version 7.55 GoldHEN'">FW 7.55</a>
        <a href="900/index.html" class="scorp-btn" onmouseover="document.getElementById('msgs').innerHTML='PS4 Version 9.00 GoldHEN (PSFree No USB)'">FW 9.00</a>
        <a href="restore/index.html" class="scorp-btn scorp-restore-btn" onmouseover="document.getElementById('msgs').innerHTML='Restore User Guide Settings'">Restore</a>
    </div>

    <!-- Credit Line Frame -->
    <div class="scorp-credits">
        Designed and Compiled By Ahmed ESSAM
    </div>

</body>
</html>
