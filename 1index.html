<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scorpion Hack All In 1</title>
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <style>
        html, body {
            background-image: url('img.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #121214;
            color: white;
            text-align: center;
            margin: 0px;
            padding: 0px;
            overflow: hidden;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* High-End Glowing Header Style */
        .scorp-header {
            font-size: 32px;
            margin-top: 40px;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 10px #ff3300, 0 0 20px #ff3300, 0 0 30px #ff6600, 0 0 40px #ff6600;
        }

        /* High-End Glowing Credits Style */
        .scorp-credits {
            font-size: 18px;
            margin-top: 60px;
            font-weight: bold;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 8px #00ffcc, 0 0 15px #00ffcc, 0 0 25px #00ffcc;
        }

        /* Pure CSS Glowing Buttons (Replaces Images) */
        .scorp-btn {
            display: inline-block;
            text-decoration: none;
            background: rgba(20, 20, 25, 0.75);
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 15px 35px;
            margin: 15px;
            border: 2px solid #ff3300;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(255, 51, 0, 0.3), inset 0 0 10px rgba(255, 51, 0, 0.2);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            cursor: pointer;
            min-width: 180px;
        }

        /* Hover Glow and Shake Animation */
        .scorp-btn:hover {
            background: #ff3300;
            color: #fff;
            box-shadow: 0 0 20px #ff3300, 0 0 40px #ff6600;
            text-shadow: 0 0 8px #fff;
            transform: translateY(-3px);
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0% { transform: translateY(-3px) translateX(0); }
            20% { transform: translateY(-3px) translateX(-3px); }
            40% { transform: translateY(-3px) translateX(3px); }
            60% { transform: translateY(-3px) translateX(-3px); }
            80% { transform: translateY(-3px) translateX(3px); }
            100% { transform: translateY(-3px) translateX(0); }
        }

        #clock {
            float: right;
            margin-right: 2.25%;
            margin-top: 15px;
            font-weight: bold;
            font-size: 28px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        
        #date {
            float: left;
            margin-left: 1.25%;
            font-weight: bold;
            margin-top: 15px;
            font-size: 28px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #msgs {
            font-size: 22px;
            font-weight: bold;
            color: #ffcc00;
            margin-top: 20px;
            min-height: 30px;
            text-shadow: 1px 1px 3px black;
        }

        #all {
            margin-top: 40px;
        }
    </style>
    <script>
        function showdate() {
            var dt = new Date();
            var Hour = dt.getHours();
            var Minute = dt.getMinutes();
            var Day = dt.getDate();
            var Month = dt.getMonth() + 1;
            var Year = dt.getFullYear();
            if (Minute < 10) { Minute = "0" + Minute; };
            if (Hour < 10) { Hour = "0" + Hour; };
            document.getElementById("date").innerHTML = (Day + "/" + Month + "/" + Year);
            document.getElementById("clock").innerHTML = (Hour + ":" + Minute);
        }
        setInterval(showdate, 1000);
    </script>
</head>
<body>

    <!-- Top Status Bar -->
    <span id="date"></span>
    <span id="clock"></span>
    
    <div style="clear: both;"></div>

    <!-- Main Title -->
    <div class="scorp-header">
        WELCOME TO SCORPION HACK ALL IN 1
    </div>

    <!-- Status/Hover Message Display -->
    <div id="msgs">Select an option below to begin</div>

    <!-- Clean Text Buttons (No Images Required) -->
    <div id="all">
        <a href="http://github.io" class="scorp-btn" onMouseOver="document.getElementById('msgs').innerHTML='Scorp page device PS3'">
            PS3 DEVICE
        </a>
        <a href="http://github.io" class="scorp-btn" onMouseOver="document.getElementById('msgs').innerHTML='Scorp page device PS4'">
            PS4 DEVICE
        </a>
        <a href="http://github.io" class="scorp-btn" onMouseOver="document.getElementById('msgs').innerHTML='Scorp page device PS5'">
            PS5 DEVICE
        </a>
        <br><br>
        <a href="https://wolfgame-ar.site" class="scorp-btn" onMouseOver="document.getElementById('msgs').innerHTML='A set of tools used PlayStation devices'">
            PS TOOLS
        </a>
        <a href="https://wolfgame-ar.site" class="scorp-btn" onMouseOver="document.getElementById('msgs').innerHTML='A collection of themes for the PS4 device'">
            PS4 THEMES
        </a>
    </div>

    <!-- Customized Credit Line -->
    <div class="scorp-credits">
        Designed and Compiled By Ahmed ESSAM
    </div>

</body>
</html>
